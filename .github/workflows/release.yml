name: Auto Release APK

on:
  repository_dispatch:
    types: [eas-build-complete]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download APK from EAS
        run: |
          curl -L "${{ github.event.client_payload.apk_url }}" -o eliana.apk || echo "APK download skipped"
          SIZE=$(du -m eliana.apk 2>/dev/null | cut -f1 || echo "54")
          echo "SIZE_MB=$SIZE" >> $GITHUB_ENV

      - name: Update version.json
        run: |
          cat > version.json << JSONEOF
          {
            "version": "${{ github.event.client_payload.version }}",
            "size_mb": "${{ env.SIZE_MB }}",
            "changelog": "${{ github.event.client_payload.changelog }}",
            "apk_url": "https://github.com/muwanindia345-beep/eliana-mc-launcher/releases/download/v${{ github.event.client_payload.version }}/eliana.apk",
            "date": "$(date +%Y-%m-%d)"
          }
          JSONEOF

      - name: Commit and push
        run: |
          git config user.email "bot@eliana.mc"
          git config user.name "ElianaMC Bot"
          git add version.json
          git diff --staged --quiet || git commit -m "release: v${{ github.event.client_payload.version }}"
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.client_payload.version }}
          name: ElianaMC v${{ github.event.client_payload.version }}
          body: ${{ github.event.client_payload.changelog }}
          files: eliana.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Discord
        run: |
          curl -H "Content-Type: application/json" \
          -d "{\"embeds\":[{\"title\":\"🚀 ElianaMC Update — v${{ github.event.client_payload.version }}\",\"description\":\"\`\`\`${{ github.event.client_payload.changelog }}\`\`\`\",\"color\":16744192,\"fields\":[{\"name\":\"📦 Size\",\"value\":\"${{ env.SIZE_MB }} MB\",\"inline\":true},{\"name\":\"📅 Date\",\"value\":\"$(date +%Y-%m-%d)\",\"inline\":true},{\"name\":\"📲 Update karo\",\"value\":\"App open karo → CHECK FOR UPDATE tap karo\"}],\"footer\":{\"text\":\"ElianaMC Auto-Release System\"}}]}" \
          "${{ secrets.DISCORD_WEBHOOK_URL }}"
